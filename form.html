<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../static/css/style.css">
  <title>Расчет энергоэффективности умного дома</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Рассчитай энергоэффективность своего дома!</h1>
      <p>Реши проблему излишнего электропотребления самостоятельно!</p>
    </div>
  </header>
  <main>
    {% block content %}
    <form action="{{ url_for('submit_form') }}" method="post" class="form">
      <div class="user">
        <ul class="user-info">
          <li class="user-info__item">
            <label for="name">Ф.И.О</label>
            <input type="text" name="name" id="name"
                   value="{{ user.name or '' }}"
                   placeholder="Введите ваше ФИО" required>
          </li>
          <li class="user-info__item">
            <label for="email">e-mail</label>
            <input type="email" name="email" id="email"
                   value="{{ user.email or '' }}"
                   placeholder="Введите ваш e-mail" required>
          </li>
          <li class="user-info__item">
            <label for="age">Ваш возраст</label>
            <input type="number" name="age" id="age" min="18" max="100"
                   value="{{ user.age or '' }}"
                   placeholder="Укажите возраст" required>
          </li>
          <li class="user-info__item">
            <label for="password">Придумайте пароль</label>
            <!-- Пароль не подставляем -->
            <input type="password" name="password" id="password"
                   placeholder="Придумайте пароль" required>
          </li>
        </ul>

        <ul class="address-date">
          <li class="user-info__item">
            <label for="address">Укажите ваш адрес</label>
            <input type="text" name="address" id="address"
                   value="{{ user.address or '' }}"
                   placeholder="Ваш адрес" required>
          </li>
          <li class="user-info__item">
            <label for="date">Укажите дату приезда наших служб</label>
            <input type="date" name="date" id="date"
                   >
          </li>
          <li class="user-info__item">
            <label for="time">Желаемое время приезда</label>
            <input type="time" name="time" id="time" required>
          </li>
        </ul>
      </div>

      <button class="button" type="submit">Готово!</button>
    </form>
    {% endblock %}
  </main>
  <footer>
  </footer>
</body>
</html>

</html>
