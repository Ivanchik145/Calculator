<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../static/css/style.css"> 
  <title>Расчет энергоэффективности умного дома</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Расчитай энергоэффективность своего дома!</h1>
      <p>Реши проблему излишнего электропотребления самостоятельно!</p>
    </div>
  </header>
  <main>
    {% block content %}
    <form action="{{ url_for('submit_form') }}" method="post" class="form">
  <div class="user">
    <ul class="user-info">
      <li class="user-info__item">
        <label for="name">Ф.И.О</label>
        <!-- Оставляем text — для ввода текста это лучший вариант -->
        <input type="text" name="name" id="name" placeholder="Введите ваше ФИО" required>
      </li>
      <li class="user-info__item">
        <label for="email">e-mail</label>
        <!-- Оставляем email — браузер проверит формат почты -->
        <input type="email" name="email" id="email" placeholder="Введите ваш e-mail" required>
      </li>
      <li class="user-info__item">
        <label for="age">Ваш возраст</label>
        <!-- number — удобно для ввода чисел, появляются стрелки вверх/вниз -->
        <input type="number" name="age" id="age" min="18" max="100" placeholder="Укажите возраст" required>
      </li>
      <li class="user-info__item">
        <label for="password">Придумайте пароль</label>
        <!-- password — скрывает символы звёздочками -->
        <input type="password" name="password" id="password" placeholder="Придумайте пароль" required>
      </li>
    </ul>

    <!-- Поля для адреса и даты -->
    <ul class="address-date">
      <li class="user-info__item">
        <label for="address">Укажите ваш адрес</label>
        <!-- text остаётся лучшим выбором для адреса -->
        <input type="text" name="address" id="address" placeholder="Ваш адрес" required>
      </li>
      <li class="user-info__item">
        <label for="date">Укажите дату приезда наших служб</label>
        <!-- date — открывает календарь в браузере -->
        <input type="date" name="date" id="date" required>
      </li>
      <li class="user-info__item">
        <label for="time">Желаемое время приезда</label>
        <!-- time — выбирает только время, без даты -->
        <input type="time" name="time" id="time" required>
      </li>
      <!-- <li class="user-info__item">
        <label>Тип услуги (выберите один вариант):</label>
        radio — позволяет выбрать только один вариант из нескольких
        <div class="radio-group">
          <label><input type="radio" name="service_type" value="audit" checked> Энергоаудит</label>
          <label><input type="radio" name="service_type" value="installation"> Установка оборудования</label>
          <label><input type="radio" name="service_type" value="consultation"> Консультация</label>
        </div>
      </li>
      <li class="user-info__item">
        <label for="priority">Приоритет заявки (шкала от 1 до 10):</label>
        <-- range — ползунок для выбора значения в диапазоне -->
        <!-- <input type="range" name="priority" id="priority" min="1" max="10" step="1" value="5">
        <span id="range-value">value</span> 
      </li> -->
    </ul>
  </div>

  <button class="button" type="submit">Готово!</button>
</form>
    {% endblock %}
  </main>
  <footer>

  </footer>
</body>
</html>
